name: Build AmneziaWG OpenWrt Packages

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version (e.g., v25.12.2, v24.10.0, snapshot)"
        required: false
        default: "snapshot"
      openwrt_architecture:
        description: "Target architecture (e.g., mediatek/filogic, ath79/generic)"
        required: false
        default: "mediatek/filogic"
      target_device:
        description: "Target device for mediatek/filogic (e.g., bpi-r4, leave empty for generic filogic)"
        required: false
        default: "bpi-r4"
  push:
    branches: [ main, master ]

jobs:
  package-only:
    runs-on: ubuntu-22.04
    env:
      OPENWRT_SRC: ${{ github.workspace }}/openwrt-main
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts
      JOBS: 2
      OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || 'snapshot' }}
      TARGET_ARCH: ${{ github.event.inputs.openwrt_architecture || 'mediatek/filogic' }}
      TARGET_DEVICE: ${{ github.event.inputs.target_device || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release info
        id: release_info
        run: |
          VERSION="${OPENWRT_VERSION}"
          ARCH="${TARGET_ARCH}"
          DEVICE="${TARGET_DEVICE}"
          
          # Strip 'v' prefix for OpenWrt downloads site (e.g., v25.12.2 -> 25.12.2)
          DOWNLOAD_VERSION="${VERSION#v}"
          
          if [ -n "$DEVICE" ]; then
            RELEASE_TAG="build-${VERSION}-${ARCH//\//-}-${DEVICE}"
            RELEASE_NAME="AmneziaWG OpenWrt ${VERSION} (${ARCH} - ${DEVICE})"
          else
            RELEASE_TAG="build-${VERSION}-${ARCH//\//-}"
            RELEASE_NAME="AmneziaWG OpenWrt ${VERSION} (${ARCH})"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "download_version=${DOWNLOAD_VERSION}" >> $GITHUB_OUTPUT
          echo "arch=${ARCH}" >> $GITHUB_OUTPUT
          echo "device=${DEVICE}" >> $GITHUB_OUTPUT
          echo "tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          echo "name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "OpenWrt Version: ${VERSION}"
          echo "Download Version: ${DOWNLOAD_VERSION}"
          echo "Architecture: ${ARCH}"
          echo "Device: ${DEVICE:-generic}"
          echo "Release Tag: ${RELEASE_TAG}"
          echo "Release Name: ${RELEASE_NAME}"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ccache git wget ca-certificates xz-utils rsync python3 python3-pip bc libncurses-dev libssl-dev libelf-dev file

      - name: Clone OpenWrt source into workspace
        run: |
          VERSION="${OPENWRT_VERSION}"
          if [ "${VERSION}" = "snapshot" ]; then
            echo "Cloning OpenWrt snapshot"
            git clone --depth 1 https://git.openwrt.org/openwrt/openwrt.git "$OPENWRT_SRC"
          else
            echo "Cloning OpenWrt release ${VERSION}"
            git clone --depth 1 --branch "${VERSION}" https://git.openwrt.org/openwrt/openwrt.git "$OPENWRT_SRC"
          fi

      - name: Copy local packages into OpenWrt tree
        run: |
          mkdir -p "$OPENWRT_SRC/package"
          # Copy package/* from the repository into the OpenWrt package directory
          if [ -d "${{ github.workspace }}/package" ]; then
            # Use cp -a to preserve layout and ensure files land under $OPENWRT_SRC/package
            cp -a "${{ github.workspace }}/package/." "$OPENWRT_SRC/package/"
          fi

      - name: Copy architecture-specific patches (if available locally)
        run: |
          ARCH="${TARGET_ARCH}"
          ARCH_NAME="${ARCH%%/*}"  # Extract first part before /
          REPO_PATCHES_DIR="${{ github.workspace }}/target/linux/${ARCH_NAME}"
          OPENWRT_PATCHES_DIR="$OPENWRT_SRC/target/linux/${ARCH_NAME}"
          
          if [ -d "$REPO_PATCHES_DIR" ]; then
            echo "Found local patches for ${ARCH_NAME}; copying to OpenWrt tree"
            mkdir -p "$OPENWRT_PATCHES_DIR"
            cp -av "$REPO_PATCHES_DIR"/patches-* "$OPENWRT_PATCHES_DIR/" || true
          else
            echo "No local patches found for ${ARCH_NAME} (repo: $REPO_PATCHES_DIR)"
          fi

      - name: Verify packages copied
        run: |
          echo "Repository package/ contents:"
          ls -la "${{ github.workspace }}/package" || true
          echo "OpenWrt package/ contents after copy:"
          ls -la "$OPENWRT_SRC/package" || true

      - name: Ensure package Makefiles exist
        run: |
          set -eux
          pkgs=( amneziawg-tools kmod-amneziawg luci-proto-amneziawg )
          for p in "${pkgs[@]}"; do
            if [ ! -f "$OPENWRT_SRC/package/$p/Makefile" ]; then
              echo "ERROR: package Makefile missing for '$p'"
              echo "Contents of $OPENWRT_SRC/package/$p (if any):"
              ls -la "$OPENWRT_SRC/package/$p" || true
              exit 1
            fi
            echo "Found Makefile for $p"
          done

      - name: Prepare OpenWrt build config and feeds
        run: |
          set -eux
          cd "$OPENWRT_SRC"
          ARCH="${TARGET_ARCH}"
          DEVICE="${TARGET_DEVICE:-}"
          VERSION="${OPENWRT_VERSION}"
          DOWNLOAD_VERSION="${VERSION#v}"  # Strip 'v' prefix
          
          # Update feeds FIRST (this is critical - feeds provide config patches)
          echo "Updating feeds (critical step before defconfig)..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Unset TARGET_ARCH so scripts/config/conf builds as a host tool (not cross-compiled)
          # This is critical - TARGET_ARCH=mediatek/filogic causes cc to receive "mediatek/filogic" as a filename!
          unset TARGET_ARCH
          unset TARGET_SUBTARGET
          unset TARGET_BOARD
          unset TARGET_PROFILE
          
          # Start with fresh defconfig (feeds must be updated first)
          echo "Running make defconfig (with verbose output)..."
          make defconfig V=s || {
            echo "ERROR: make defconfig failed"
            exit 1
          }
          
          # Restore TARGET_ARCH for later steps (but don't export - let .config define it)
          # The .config file already has the target architecture, so we don't need env var
          # export TARGET_ARCH="${ARCH}"
          
          # Append device-specific or generic config based on architecture + device
          ARCH_NAME="${ARCH%%/*}"  # Extract first part (e.g., mediatek from mediatek/filogic)
          ARCH_SUBNAME="${ARCH##*/}"  # Extract second part (e.g., filogic)
          
          # Construct config filename based on device selection
          # If device is specified (e.g., bpi-r4), look for {arch}-{subarch}-{device}.config
          # Otherwise just use generic.config
          CONFIG_FILE=""
          if [ -n "$DEVICE" ]; then
            # Device-specific search: {arch}-{subarch}-{device}.config
            for candidate in \
              "${{ github.workspace }}/configs/${ARCH_NAME}-${ARCH_SUBNAME}-${DEVICE}.config" \
              "${{ github.workspace }}/configs/generic.config"; do
              if [ -f "$candidate" ]; then
                CONFIG_FILE="$candidate"
                echo "Using config: $(basename $CONFIG_FILE) (device: ${DEVICE})"
                break
              fi
            done
          else
            # No device specified; use generic only
            if [ -f "${{ github.workspace }}/configs/generic.config" ]; then
              CONFIG_FILE="${{ github.workspace }}/configs/generic.config"
              echo "Using config: generic.config (no device specified)"
            fi
          fi
          
          if [ -n "$CONFIG_FILE" ]; then
            cat "$CONFIG_FILE" >> .config
            echo "Appended $(basename $CONFIG_FILE) to .config"
          else
            echo "WARNING: No config file found"
          fi
          
          # CRITICAL: Regenerate config to incorporate device-specific kernel options
          echo "Regenerating config with device-specific options..."
          unset TARGET_ARCH TARGET_SUBTARGET TARGET_BOARD TARGET_PROFILE
          make defconfig V=s
          
          # Install host build tools first (m4, flex, etc) - required before kernel compile
          echo "Installing host build tools (tools/install) - required for kernel build"
          if ! make tools/install -j${JOBS}; then
            echo "tools/install failed; re-running with verbose output"
            make tools/install V=s -j1 || true
          fi
          # Install cross toolchain (required for kernel compilation)
          echo "Installing cross toolchain (this may take a while)..."
          if ! make toolchain/install -j${JOBS}; then
            echo "toolchain/install failed; re-running with verbose output"
            make toolchain/install V=s -j1 || true
          fi
          # Prepare kernel sources/headers early so kmod packages can prepare against them
          echo "Preparing kernel sources/headers for target (early)..."
          make target/linux/prepare -j${JOBS}
          # Compile kernel (produces linux-*/.config and headers required by external modules)
          echo "Compiling kernel (will generate .config and headers)..."
          if ! make target/linux/compile -j${JOBS}; then
            echo "Kernel compile failed; re-running with verbose output"
            make target/linux/compile V=s -j1
            exit 1
          fi

      - name: Build packages (prepare + compile)
        run: |
          set -eux
          cd "$OPENWRT_SRC"
          # CRITICAL: Unset TARGET_ARCH to prevent cross-compilation of host tools
          # This is needed because GitHub Actions inherits environment variables from previous steps
          unset TARGET_ARCH
          unset TARGET_SUBTARGET
          unset TARGET_BOARD
          unset TARGET_PROFILE
          # Build a minimal set of host tools required for packaging instead of full tools/install.
          # This attempts to compile only what's needed to run package prepare/compile (libdeflate, apk, openssl).
          # If any of these targets are not present in the OpenWrt tree, fall back to tools/install.
          set -eux
           # If host tools are already installed by tools/install (earlier), skip the minimal host build.
           if [ -x "${PWD}/staging_dir/host/bin/m4" ] && [ -x "${PWD}/staging_dir/host/bin/sed" ]; then
             echo "Host tools already installed; skipping minimal host build"
           else
           # Try building a minimal set of host tools in a subshell. If any step fails
           # (for example due to missing host-build.mk), fall back to building the full tools/install.
           (
              set -eux

            # Build small host toolchain pieces commonly required by host package builds
            for t in tools/sed tools/patch tools/tar tools/m4 tools/libdeflate tools/ninja; do
              # Try to build sed explicitly; other tools use 'make -n' to check availability
              if [ "$t" = "tools/sed" ]; then
                echo "Building ${t} (explicit compile + install)..."
                make ${t}/compile -j${JOBS} || true
                make ${t}/install || true
              else
                if make -n ${t}/compile >/dev/null 2>&1; then
                  echo "Building ${t} (compile + install)..."
                  make ${t}/compile -j${JOBS}
                  # Attempt to run the install step for this tool if available
                if make -n ${t}/install >/dev/null 2>&1; then
                    if ! make ${t}/install -j${JOBS}; then
                      echo "Install for ${t} failed; re-running with verbose output"
                      make ${t}/install V=s -j1 || true
                    fi
                  fi
                fi
              fi

              # After build+install, try to locate the expected host binary and print diagnostics
              case "$t" in
                tools/sed) bin=sed ;;
                tools/patch) bin=patch ;;
                tools/tar) bin=tar ;;
                tools/m4) bin=m4 ;;
                tools/libdeflate) bin=libdeflate-gzip ;;
                tools/ninja) bin=ninja ;;
                *) bin= ;;
              esac
              if [ -n "${bin}" ]; then
                if [ -x "${PWD}/staging_dir/host/bin/${bin}" ]; then
                  echo "Found ${bin} at staging_dir/host/bin/${bin}"
                  ${PWD}/staging_dir/host/bin/${bin} --version 2>/dev/null || ${PWD}/staging_dir/host/bin/${bin} -V 2>/dev/null || true
                else
                  echo "Binary ${bin} not found in staging_dir/host/bin after building ${t}"
                  echo "Contents of staging_dir/host/bin:"; ls -la "${PWD}/staging_dir/host/bin" || true
                  echo "Contents of build_dir/hostpkg (recent):"; ls -la "${PWD}/build_dir/hostpkg" | tail -n 20 || true
                fi
              fi
            done
            
            # Build the host apk tool (compile + install)
            if make -n package/system/apk/host/compile >/dev/null 2>&1; then
              make package/system/apk/host/compile -j${JOBS}
              if make -n package/system/apk/host/install >/dev/null 2>&1; then
                if ! make package/system/apk/host/install -j${JOBS}; then
                  echo "apk host install failed; re-running with verbose output"
                  make package/system/apk/host/install V=s -j1 || true
                fi
              fi
            fi

            # Build host openssl if available (compile + install)
            if make -n package/openssl/host/compile >/dev/null 2>&1; then
              echo "Attempting explicit package/openssl host build"
              make package/openssl/host/compile -j${JOBS} || true
                if make -n package/openssl/host/install >/dev/null 2>&1; then
                if ! make package/openssl/host/install -j${JOBS}; then
                  echo "openssl host install failed; re-running with verbose output"
                  make package/openssl/host/install V=s -j1 || true
                fi
              fi
            fi

            # Try ninja host install explicitly when available
            if make -n tools/ninja/install >/dev/null 2>&1; then
              make tools/ninja/install || true
            fi
          ) || {
            echo "Minimal host tool build failed, falling back to make tools/install"
            make tools/install -j${JOBS}
          }
          fi

          # Verify that essential host binaries exist; if not, fall back to tools/install
          missing=()
          for bin in sed libdeflate-gzip openssl; do
            if [ ! -x "${PWD}/staging_dir/host/bin/$bin" ]; then
              missing+=("$bin")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing host binaries: ${missing[*]} - running make tools/install to ensure host tools are available"
            make tools/install -j${JOBS}
          fi

          # Rebuild package index so make knows about newly added package/* directories
          make package/index
          # Build sequence: prepare and compile required packages only. Keep JOBS small on hosted runners.
          make package/luci-proto-amneziawg/{clean,download,prepare} V=s
          make package/luci-proto-amneziawg/compile -j${JOBS} V=s

          make package/kmod-amneziawg/{clean,download,prepare} V=s
          make package/kmod-amneziawg/compile -j${JOBS} V=s

          make package/amneziawg-tools/{clean,download,prepare} V=s
          make package/amneziawg-tools/compile -j${JOBS} V=s

      - name: Collect APK artifacts
        run: |
          set -eux
          mkdir -p "$ARTIFACT_DIR"
          # Copy package APKS
          if [ -d "$OPENWRT_SRC/bin/packages" ]; then
            find "$OPENWRT_SRC/bin/packages" -type f \( -iname "*amneziawg*.apk" -o -iname "*kmod-amneziawg*.apk" \) -exec cp -a {} "$ARTIFACT_DIR/" \; || true
          fi
          # Copy target-specific APKS (kernel modules, etc)
          if [ -d "$OPENWRT_SRC/bin/targets" ]; then
            find "$OPENWRT_SRC/bin/targets" -type f -iname "*kmod-amneziawg*.apk" -exec cp -a {} "$ARTIFACT_DIR/" \; || true
          fi
          # Create a tar.xz containing the APKs (if any)
          cd "$ARTIFACT_DIR"
          shopt -s nullglob
          apks=( *.apk )
          if [ ${#apks[@]} -gt 0 ]; then
            tar -cJf amneziawg-packages.tar.xz --ignore-failed-read "${apks[@]}"
          else
            echo "No APKs found"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-apks
          path: ${{ github.workspace }}/artifacts/**

      - name: Create GitHub Release
        if: always()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          files: ${{ github.workspace }}/artifacts/**
          draft: false
          prerelease: ${{ contains(steps.release_info.outputs.version, 'snapshot') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
