name: Build AmneziaWG OpenWrt Packages

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-packages:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ccache git wget ca-certificates xz-utils rsync python3 python3-pip bc libncurses-dev libssl-dev libelf-dev file

      - name: Clone OpenWrt source
        run: git clone --depth 1 https://git.openwrt.org/openwrt/openwrt.git openwrt-main

      - name: Make compile script executable
        run: chmod +x ./compile_openwrt.sh

      - name: Run build (may take long)
        run: |
          OPENWRT_SRC=${{ runner.workdir }}/openwrt-main ARTIFACT_DIR=${{ runner.workdir }}/artifacts ./compile_openwrt.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-apks
          path: artifacts/**
